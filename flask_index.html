    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Friendly chat </title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #000000, #001f3f, #000000);
                color: #fff;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .chat-container {
                width: 420px;
                max-height: 90vh;
                background: rgba(255,255,255,0.05);
                backdrop-filter: blur(12px);
                border-radius: 20px;
                border: 1px solid rgba(255,255,255,0.1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            }
            .chat-header {
                padding: 20px;
                text-align: center;
                background: rgba(255,255,255,0.05);
                border-bottom: 1px solid rgba(255,255,255,0.08);
            }
            .chat-header h1 { font-size: 1.3rem; font-weight: 600; }
            .chat-header p { font-size: 0.8rem; opacity: 0.6; margin-top: 4px; }
            .chat-messages {
                flex: 1;
                padding: 16px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-height: 350px;
                max-height: 55vh;
            }
            .msg {
                max-width: 80%;
                padding: 10px 14px;
                border-radius: 16px;
                font-size: 0.9rem;
                line-height: 1.4;
                animation: fadeIn 0.3s ease;
            }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
            .msg.user {
                align-self: flex-end;
                background: linear-gradient(135deg, #0052D4, #4364F7);
                border-bottom-right-radius: 4px;
            }
            .msg.bot {
                align-self: flex-start;
                background: #000000;
                border: 1px solid #0052D4;
                border-bottom-left-radius: 4px;
            }
            .msg .confidence {
                display: block;
                font-size: 0.7rem;
                opacity: 0.5;
                margin-top: 4px;
            }
            .chat-input {
                display: flex;
                padding: 12px;
                gap: 8px;
                background: rgba(255,255,255,0.03);
                border-top: 1px solid rgba(255,255,255,0.08);
            }
            .chat-input input {
                flex: 1;
                padding: 10px 14px;
                border: none;
                border-radius: 12px;
                background: rgba(255,255,255,0.1);
                color: #fff;
                font-size: 0.9rem;
                outline: none;
            }
            .chat-input input::placeholder { color: rgba(255,255,255,0.4); }
            .chat-input button {
                padding: 10px 18px;
                border: none;
                border-radius: 12px;
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: #fff;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.15s;
            }
            .chat-input button:hover { transform: scale(1.05); }
        </style>
    </head>
    <body>
        <div class="chat-container">
            <div class="chat-header">
                <h1>🤖 Friendly chat</h1>
                <p>Powered by TF-IDF &amp; Cosine Similarity</p>
            </div>
            <div class="chat-messages" id="messages">
                <div class="msg bot">Hello! Ask me anything about AI, Python, ML, tech, and more.</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off" />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <script>
            const input = document.getElementById('userInput');
            const messages = document.getElementById('messages');

            input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

            async function sendMessage() {
                const text = input.value.trim();
                if (!text) return;
                appendMsg(text, 'user');
                input.value = '';

                try {
                    const res = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    const data = await res.json();
                    const conf = (data.confidence * 100).toFixed(1);
                    appendMsg(data.answer + `<span class="confidence">${conf}% confidence</span>`, 'bot');
                } catch {
                    appendMsg('⚠️ Could not reach the server.', 'bot');
                }
            }

            function appendMsg(html, sender) {
                const div = document.createElement('div');
                div.className = 'msg ' + sender;
                div.innerHTML = html;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }
        </script>
    </body>
    </html>
